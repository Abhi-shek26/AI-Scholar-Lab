<svg viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <defs>
    <linearGradient id="heroGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0B0F1A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1f3a;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="accentGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#00E0FF;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#00E0FF;stop-opacity:0" />
    </radialGradient>
  </defs>

  <rect width="600" height="400" fill="url(#heroGrad)"/>

  <!-- Glowing orbs -->
  <circle cx="150" cy="100" r="80" fill="url(#accentGlow)" opacity="0.8"/>
  <circle cx="500" cy="300" r="120" fill="url(#accentGlow)" opacity="0.6"/>

  <!-- AI Brain/Neural Network -->
  <g transform="translate(300, 200)">
    <!-- Center node -->
    <circle cx="0" cy="0" r="12" fill="#00E0FF" stroke="#00E0FF" stroke-width="2"/>

    <!-- Connected nodes -->
    <circle cx="-60" cy="-60" r="8" fill="#7C3AED" stroke="#7C3AED" stroke-width="1.5"/>
    <circle cx="60" cy="-60" r="8" fill="#7C3AED" stroke="#7C3AED" stroke-width="1.5"/>
    <circle cx="-60" cy="60" r="8" fill="#7C3AED" stroke="#7C3AED" stroke-width="1.5"/>
    <circle cx="60" cy="60" r="8" fill="#7C3AED" stroke="#7C3AED" stroke-width="1.5"/>
    <circle cx="0" cy="-80" r="8" fill="#7C3AED" stroke="#7C3AED" stroke-width="1.5"/>
    <circle cx="0" cy="80" r="8" fill="#7C3AED" stroke="#7C3AED" stroke-width="1.5"/>

    <!-- Connection lines -->
    <line x1="0" y1="0" x2="-60" y2="-60" stroke="#00E0FF" stroke-width="1.5" opacity="0.6"/>
    <line x1="0" y1="0" x2="60" y2="-60" stroke="#00E0FF" stroke-width="1.5" opacity="0.6"/>
    <line x1="0" y1="0" x2="-60" y2="60" stroke="#00E0FF" stroke-width="1.5" opacity="0.6"/>
    <line x1="0" y1="0" x2="60" y2="60" stroke="#00E0FF" stroke-width="1.5" opacity="0.6"/>
    <line x1="0" y1="0" x2="0" y2="-80" stroke="#00E0FF" stroke-width="1.5" opacity="0.6"/>
    <line x1="0" y1="0" x2="0" y2="80" stroke="#00E0FF" stroke-width="1.5" opacity="0.6"/>
  </g>

  <!-- Floating particles -->
  <circle cx="100" cy="80" r="2" fill="#00E0FF" opacity="0.7"/>
  <circle cx="520" cy="120" r="2" fill="#7C3AED" opacity="0.7"/>
  <circle cx="450" cy="350" r="2" fill="#00E0FF" opacity="0.7"/>
  <circle cx="80" cy="320" r="2" fill="#7C3AED" opacity="0.7"/>
</svg>