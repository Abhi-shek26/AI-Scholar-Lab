<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="labGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0B0F1A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e1a33;stop-opacity:1" />
    </linearGradient>
  </defs>

  <rect width="800" height="600" fill="url(#labGrad)"/>

  <!-- Desk -->
  <rect x="50" y="350" width="700" height="150" fill="#1a1f35" rx="4"/>
  <rect x="50" y="340" width="700" height="20" fill="#2a3a50" rx="2"/>

  <!-- Data visualization panels on desk -->
  <g>
    <!-- Left panel -->
    <rect x="80" y="200" width="200" height="160" fill="#0f1318" stroke="#00E0FF" stroke-width="2" rx="4"/>
    <text x="100" y="225" font-family="sans-serif" font-size="12" fill="#00E0FF">Model Accuracy</text>
    <rect x="100" y="235" width="30" height="100" fill="#7C3AED" opacity="0.8"/>
    <rect x="140" y="225" width="30" height="110" fill="#00E0FF" opacity="0.8"/>
    <rect x="180" y="245" width="30" height="90" fill="#7C3AED" opacity="0.8"/>

    <!-- Center panel -->
    <rect x="300" y="180" width="200" height="180" fill="#0f1318" stroke="#7C3AED" stroke-width="2" rx="4"/>
    <text x="320" y="205" font-family="sans-serif" font-size="12" fill="#7C3AED">Training Loss</text>
    <polyline points="320,220 350,280 380,250 410,200 440,240 470,210 500,190"
              fill="none" stroke="#00E0FF" stroke-width="2" opacity="0.7"/>
    <circle cx="320" cy="220" r="3" fill="#00E0FF"/>
    <circle cx="350" cy="280" r="3" fill="#00E0FF"/>
    <circle cx="380" cy="250" r="3" fill="#00E0FF"/>
    <circle cx="410" cy="200" r="3" fill="#00E0FF"/>
    <circle cx="440" cy="240" r="3" fill="#00E0FF"/>
    <circle cx="470" cy="210" r="3" fill="#00E0FF"/>
    <circle cx="500" cy="190" r="3" fill="#00E0FF"/>

    <!-- Right panel -->
    <rect x="520" y="200" width="200" height="160" fill="#0f1318" stroke="#00E0FF" stroke-width="2" rx="4"/>
    <text x="540" y="225" font-family="sans-serif" font-size="12" fill="#00E0FF">Data Flow</text>
    <g stroke="#7C3AED" stroke-width="2" fill="none">
      <circle cx="560" cy="250" r="15"/>
      <circle cx="620" cy="280" r="15"/>
      <circle cx="660" cy="250" r="15"/>
      <line x1="575" y1="250" x2="605" y2="280"/>
      <line x1="635" y1="280" x2="645" y2="260"/>
    </g>
  </g>

  <!-- Person silhouette -->
  <g fill="none" stroke="#00E0FF" stroke-width="2" opacity="0.7">
    <!-- Head -->
    <circle cx="400" cy="100" r="25"/>
    <!-- Body -->
    <line x1="400" y1="125" x2="400" y2="200"/>
    <!-- Arms -->
    <line x1="400" y1="145" x2="340" y2="180"/>
    <line x1="400" y1="145" x2="460" y2="180"/>
    <!-- Legs -->
    <line x1="400" y1="200" x2="370" y2="280"/>
    <line x1="400" y1="200" x2="430" y2="280"/>
  </g>

  <!-- Particles floating -->
  <g fill="#00E0FF" opacity="0.5">
    <circle cx="150" cy="80" r="2"/>
    <circle cx="500" cy="120" r="3"/>
    <circle cx="700" cy="150" r="2"/>
    <circle cx="100" cy="400" r="2.5"/>
  </g>

  <g fill="#7C3AED" opacity="0.4">
    <circle cx="250" cy="50" r="3"/>
    <circle cx="600" cy="400" r="2"/>
    <circle cx="750" cy="300" r="2.5"/>
  </g>

  <!-- Glow effects -->
  <circle cx="300" cy="250" r="150" fill="#00E0FF" opacity="0.08"/>
  <circle cx="650" cy="400" r="120" fill="#7C3AED" opacity="0.06"/>
</svg>