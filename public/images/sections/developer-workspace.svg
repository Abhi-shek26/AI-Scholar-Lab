<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="deskGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0B0F1A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e1a33;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="monitorGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00E0FF;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#7C3AED;stop-opacity:0.2" />
    </linearGradient>
  </defs>

  <rect width="800" height="600" fill="url(#deskGrad)"/>

  <!-- Desk surface -->
  <ellipse cx="400" cy="450" rx="350" ry="100" fill="#1a1f35" opacity="0.8"/>
  <rect x="50" y="400" width="700" height="200" fill="#0f1318" opacity="0.6"/>

  <!-- Monitor stand -->
  <rect x="340" y="350" width="120" height="80" fill="#2a2a3a" rx="4"/>
  <rect x="360" y="430" width="80" height="20" fill="#3a3a4a"/>

  <!-- Monitor frame -->
  <rect x="120" y="80" width="560" height="320" fill="#1a1a2e" stroke="#00E0FF" stroke-width="3" rx="8"/>

  <!-- Monitor screen - Code editor visualization -->
  <defs>
    <linearGradient id="screenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d0f18;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1a2e;stop-opacity:1" />
    </linearGradient>
  </defs>

  <rect x="130" y="95" width="540" height="300" fill="url(#screenGrad)"/>

  <!-- Code lines with syntax highlighting -->
  <g font-family="'Monaco', 'Courier New', monospace" font-size="14" fill="#00E0FF" opacity="0.9">
    <text x="150" y="130">function buildAI() {</text>
    <text x="170" y="160" fill="#7C3AED">  const</text>
    <text x="260" y="160" fill="#00E0FF"> model = </text>
    <text x="420" y="160" fill="#FFA500">train</text>
    <text x="500" y="160">(data);</text>

    <text x="170" y="190" fill="#7C3AED">  return</text>
    <text x="300" y="190" fill="#00E0FF"> model.</text>
    <text x="450" y="190" fill="#FFA500">deploy</text>
    <text x="540" y="190">();</text>

    <text x="150" y="220">}</text>

    <text x="150" y="260">export const AI = {</text>
    <text x="170" y="290" fill="#7C3AED">  power</text>
    <text x="285" y="290">: </text>
    <text x="305" y="290" fill="#00E0FF">'unlimited'</text>
    <text x="150" y="320">}</text>
  </g>

  <!-- Cursor -->
  <rect x="270" y="225" width="2" height="20" fill="#00E0FF" opacity="0.8"/>

  <!-- Monitor glow -->
  <rect x="130" y="95" width="540" height="300" fill="url(#monitorGlow)" opacity="0.3"/>

  <!-- Keyboard -->
  <rect x="140" y="420" width="520" height="40" fill="#1a1a2a" rx="4"/>
  <g fill="#2a2a3a" opacity="0.6">
    <rect x="160" y="435" width="20" height="20"/>
    <rect x="190" y="435" width="20" height="20"/>
    <rect x="220" y="435" width="20" height="20"/>
    <rect x="250" y="435" width="20" height="20"/>
    <rect x="330" y="435" width="20" height="20"/>
    <rect x="360" y="435" width="20" height="20"/>
    <rect x="480" y="435" width="20" height="20"/>
    <rect x="510" y="435" width="20" height="20"/>
  </g>

  <!-- Mouse -->
  <ellipse cx="680" cy="440" rx="20" ry="30" fill="#2a2a3a"/>
  <circle cx="680" cy="410" r="8" fill="#7C3AED" opacity="0.7"/>

  <!-- Light elements -->
  <circle cx="680" cy="120" r="100" fill="#00E0FF" opacity="0.05" filter="drop-shadow(0 0 30px #00E0FF)"/>
  <circle cx="100" cy="500" r="80" fill="#7C3AED" opacity="0.04" filter="drop-shadow(0 0 20px #7C3AED)"/>
</svg>