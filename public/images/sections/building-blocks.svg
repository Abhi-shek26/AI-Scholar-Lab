<svg viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="buildGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0B0F1A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1f3a;stop-opacity:1" />
    </linearGradient>
  </defs>

  <rect width="600" height="400" fill="url(#buildGrad)"/>

  <!-- Building blocks -->
  <g transform="translate(300, 200)">
    <!-- Bottom layer -->
    <rect x="-90" y="40" width="50" height="50" fill="#00E0FF" opacity="0.8" rx="4"/>
    <rect x="-30" y="40" width="50" height="50" fill="#7C3AED" opacity="0.8" rx="4"/>
    <rect x="30" y="40" width="50" height="50" fill="#00E0FF" opacity="0.8" rx="4"/>

    <!-- Middle layer -->
    <rect x="-60" y="-20" width="50" height="50" fill="#7C3AED" opacity="0.9" rx="4"/>
    <rect x="10" y="-20" width="50" height="50" fill="#00E0FF" opacity="0.9" rx="4"/>

    <!-- Top layer -->
    <rect x="-15" y="-80" width="50" height="50" fill="#00E0FF" opacity="1" rx="4"/>

    <!-- Code symbols -->
    <text x="-85" y="75" fill="#0B0F1A" font-size="24" font-weight="bold" text-anchor="middle">&lt;</text>
    <text x="-25" y="75" fill="#0B0F1A" font-size="24" font-weight="bold" text-anchor="middle">/</text>
    <text x="55" y="75" fill="#0B0F1A" font-size="24" font-weight="bold" text-anchor="middle">&gt;</text>
  </g>

  <!-- Light rays -->
  <line x1="50" y1="100" x2="150" y2="150" stroke="#00E0FF" stroke-width="2" opacity="0.4"/>
  <line x1="550" y1="150" x2="450" y2="250" stroke="#7C3AED" stroke-width="2" opacity="0.4"/>
</svg>