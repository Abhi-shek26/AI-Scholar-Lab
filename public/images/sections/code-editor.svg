<svg viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="codeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0B0F1A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1f3a;stop-opacity:1" />
    </linearGradient>
  </defs>

  <rect width="600" height="400" fill="url(#codeGrad)"/>

  <!-- Code window -->
  <rect x="75" y="50" width="450" height="300" fill="rgba(0,224,255,0.05)" stroke="#00E0FF" stroke-width="2" rx="8" opacity="0.8"/>

  <!-- Window header -->
  <rect x="75" y="50" width="450" height="30" fill="#00E0FF" opacity="0.1" rx="8" rx="0"/>
  <circle cx="95" cy="65" r="3" fill="#7C3AED"/>
  <circle cx="110" cy="65" r="3" fill="#00E0FF"/>
  <circle cx="125" cy="65" r="3" fill="#7C3AED"/>

  <!-- Code lines -->
  <g transform="translate(95, 95)" font-family="monospace" font-size="12" fill="#00E0FF" opacity="0.8">
    <text x="0" y="0">function buildAI() {</text>
    <text x="20" y="20">const model = train(data);</text>
    <text x="20" y="40">return model.deploy();</text>
    <text x="0" y="60">}</text>
  </g>

  <!-- Syntax highlight -->
  <rect x="95" y="115" width="20" height="12" fill="#7C3AED" opacity="0.3"/>
  <rect x="300" y="135" width="30" height="12" fill="#7C3AED" opacity="0.3"/>

  <!-- Active indicator -->
  <circle cx="90" cy="145" r="2" fill="#7C3AED" opacity="0.9"/>
</svg>