<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="achieveGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0B0F1A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e1a33;stop-opacity:1" />
    </linearGradient>
  </defs>

  <rect width="800" height="600" fill="url(#achieveGrad)"/>

  <!-- Achievement/Trophy visualization -->
  <g>
    <!-- Base -->
    <rect x="300" y="420" width="200" height="30" fill="#2a2a3a" rx="4"/>

    <!-- Pedestal -->
    <polygon points="340,420 460,420 450,350 350,350" fill="#3a3a4a"/>

    <!-- Trophy/Cup -->
    <path d="M 350 350 Q 320 300 340 250 L 360 240 L 360 350 Z" fill="#FFD700"/>
    <path d="M 450 350 Q 480 300 460 250 L 440 240 L 440 350 Z" fill="#FFD700"/>
    <ellipse cx="400" cy="240" rx="45" ry="25" fill="#FFA500"/>
    <ellipse cx="400" cy="235" rx="45" ry="20" fill="#FFD700"/>

    <!-- Star on top -->
    <polygon points="400,190 410,220 440,220 415,240 425,270 400,250 375,270 385,240 360,220 390,220"
             fill="#00E0FF" filter="drop-shadow(0 0 10px #00E0FF)"/>
  </g>

  <!-- Achievement badges/medals -->
  <g>
    <!-- Left medal -->
    <circle cx="200" cy="280" r="45" fill="#0f1318" stroke="#7C3AED" stroke-width="2"/>
    <circle cx="200" cy="280" r="35" fill="#7C3AED" opacity="0.3"/>
    <text x="185" y="290" font-family="sans-serif" font-size="24" fill="#7C3AED">🏆</text>
    <line x1="200" y1="220" x2="200" y2="150" stroke="#7C3AED" stroke-width="2" stroke-dasharray="5,5"/>

    <!-- Right medal -->
    <circle cx="600" cy="280" r="45" fill="#0f1318" stroke="#00E0FF" stroke-width="2"/>
    <circle cx="600" cy="280" r="35" fill="#00E0FF" opacity="0.3"/>
    <text x="585" y="290" font-family="sans-serif" font-size="24" fill="#00E0FF">⭐</text>
    <line x1="600" y1="220" x2="600" y2="150" stroke="#00E0FF" stroke-width="2" stroke-dasharray="5,5"/>
  </g>

  <!-- Success indicators -->
  <g>
    <!-- Checkmarks -->
    <g stroke="#00E0FF" stroke-width="3" fill="none" opacity="0.9">
      <!-- Large checkmark -->
      <path d="M 100 400 L 150 450 L 220 350" stroke-linecap="round" stroke-linejoin="round"/>

      <!-- Right checkmark -->
      <path d="M 680 400 L 730 450 L 800 350" stroke="#7C3AED" stroke-linecap="round" stroke-linejoin="round"/>
    </g>

    <!-- Success text indicators -->
    <text x="80" y="500" font-family="sans-serif" font-size="14" fill="#00E0FF" opacity="0.8">Published</text>
    <text x="660" y="500" font-family="sans-serif" font-size="14" fill="#7C3AED" opacity="0.8">Deployed</text>
    <text x="330" y="550" font-family="sans-serif" font-size="14" fill="#00E0FF" opacity="0.8">Awards & Recognition</text>
  </g>

  <!-- Particle effects -->
  <g fill="#00E0FF" opacity="0.6">
    <circle cx="400" cy="100" r="3"/>
    <circle cx="350" cy="150" r="2"/>
    <circle cx="450" cy="140" r="2.5"/>
    <circle cx="300" cy="200" r="2"/>
    <circle cx="500" cy="210" r="2"/>
  </g>

  <g fill="#7C3AED" opacity="0.5">
    <circle cx="250" cy="100" r="2.5"/>
    <circle cx="550" cy="90" r="2"/>
    <circle cx="650" cy="150" r="3"/>
  </g>

  <!-- Glow effects -->
  <circle cx="400" cy="300" r="180" fill="#00E0FF" opacity="0.08"/>
  <circle cx="400" cy="150" r="100" fill="#7C3AED" opacity="0.07"/>
</svg>